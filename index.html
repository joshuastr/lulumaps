<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuluMaps</title>
  <meta name="description" content="Discover cool neighbourhoods anchored by Lululemon stores">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="app-header">
    <div class="header-left">
      <h1 class="app-title" id="home-link" style="cursor:pointer"><span class="title-lulu">Lulu</span><span class="title-maps">Maps</span></h1>
    </div>
    <div class="header-search">
      <div class="search-wrap">
        <input
          type="text"
          id="city-input"
          placeholder="Search a city"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="search-btn" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <div id="city-suggestions" class="city-suggestions hidden"></div>
      </div>
    </div>
  </header>

  <main id="app-main">
    <section id="map-panel">
      <div id="map"></div>
    </section>

    <section id="discovery-panel">
      <div id="store-selector" class="hidden">
        <p class="store-selector-label">Lululemon locations</p>
        <div id="store-list"></div>
      </div>

      <div id="filters" class="hidden">
        <div class="filter-row">
          <button class="filter-pill active" data-type="all">All</button>
          <button class="filter-pill" data-type="food">Food</button>
          <button class="filter-pill" data-type="coffee">Coffee</button>
          <button class="filter-pill" data-type="drinks">Drinks</button>
          <button class="filter-pill" data-type="shopping">Shopping</button>
          <button class="filter-pill" data-type="wellness">Wellness</button>
          <button class="filter-pill" data-type="culture">Culture</button>
        </div>
        <div class="radius-row">
          <span class="radius-label">Walking radius</span>
          <div class="radius-toggle">
            <button class="radius-btn" data-radius="400">5 min</button>
            <button class="radius-btn active" data-radius="800">10 min</button>
            <button class="radius-btn" data-radius="1200">15 min</button>
          </div>
        </div>
      </div>

      <div id="places-list"></div>

      <div id="empty-state">
        <p class="empty-title">📍 Where to?</p>
        <p class="empty-body">Pick a city to discover the neighbourhood around its Lululemon stores.</p>
        <p class="quick-cities-label">Popular cities</p>
        <div class="quick-cities">
          <button class="quick-city" data-city="Calgary">Calgary</button>
          <button class="quick-city" data-city="New York">New York</button>
          <button class="quick-city" data-city="Toronto">Toronto</button>
          <button class="quick-city" data-city="London">London</button>
          <button class="quick-city" data-city="Los Angeles">Los Angeles</button>
          <button class="quick-city" data-city="Vancouver">Vancouver</button>
          <button class="quick-city" data-city="Chicago">Chicago</button>
          <button class="quick-city" data-city="San Francisco">San Francisco</button>
          <button class="quick-city" data-city="Miami">Miami</button>
          <button class="quick-city" data-city="Paris">Paris</button>
          <button class="quick-city" data-city="Sydney">Sydney</button>
          <button class="quick-city" data-city="Tokyo">Tokyo</button>
        </div>
      </div>

      <div id="loading-state" class="hidden">
        <div class="loader"></div>
        <p>Searching the neighbourhood</p>
      </div>

      <div id="no-results" class="hidden">
        <p class="empty-title">Nothing here yet</p>
        <p class="empty-body">Try expanding the radius or choosing a different filter.</p>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
